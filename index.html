<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#f8f3e7" id="metaThemeColor">
<title>Zdania z Klocków — Angielski dla klas 1–8</title>

<script>
// Initialize theme before render to avoid FOUC
(function() {
  try {
    var saved = localStorage.getItem('zdaniaZKlockow:theme');
    var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    // Pre-set meta theme-color so the mobile status bar matches on first paint
    document.addEventListener('DOMContentLoaded', function() {
      var meta = document.getElementById('metaThemeColor');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#14110b' : '#f8f3e7');
    });
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ====================== RESET & BASE ====================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: var(--ink);
  background: var(--paper);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  touch-action: manipulation;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; border-radius: 4px; }

/* ====================== DESIGN TOKENS (LIGHT + DARK) ====================== */
:root {
  --paper: #f8f3e7;
  --paper-deeper: #f0e7d2;
  --paper-card: #fdfaf2;
  --ink: #1f2430;
  --ink-soft: #5a6072;
  --ink-faint: #8a8b96;
  --line: #d8cdb1;
  --line-soft: #e6dcc4;
  --accent-green: #4a7c59;
  --accent-green-soft: #d4e3d4;
  --accent-red: #a8443f;
  --accent-red-soft: #f0d4d2;
  --accent-gold: #b8893f;
  --accent-gold-soft: #f0e2c4;
  --tile-bg: #ffffff;
  --tile-shadow: 0 1px 2px rgba(40, 30, 10, 0.06), 0 2px 8px rgba(40, 30, 10, 0.05);
  --tile-shadow-hover: 0 2px 4px rgba(40, 30, 10, 0.08), 0 6px 16px rgba(40, 30, 10, 0.1);
  --tile-shadow-active: 0 1px 2px rgba(40, 30, 10, 0.1);
  --radius: 10px;
  --noise-opacity: 0.4;
  --bg-radial-1: rgba(184, 137, 63, 0.06);
  --bg-radial-2: rgba(74, 124, 89, 0.05);
  --slot-bg: rgba(255, 255, 255, 0.55);
  --modal-backdrop: rgba(20, 18, 10, 0.45);
}

[data-theme="dark"] {
  --paper: #181d27;
  --paper-deeper: #222836;
  --paper-card: #232a36;
  --ink: #ece4d1;
  --ink-soft: #a8a297;
  --ink-faint: #6f6a5f;
  --line: #3a4250;
  --line-soft: #2a3140;
  --accent-green: #7eb085;
  --accent-green-soft: #1f2f25;
  --accent-red: #d4807a;
  --accent-red-soft: #3a2421;
  --accent-gold: #d4a55a;
  --accent-gold-soft: #3a2c18;
  --tile-bg: #2b3340;
  --tile-shadow: 0 1px 2px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.25);
  --tile-shadow-hover: 0 2px 4px rgba(0, 0, 0, 0.45), 0 6px 16px rgba(0, 0, 0, 0.4);
  --tile-shadow-active: 0 1px 2px rgba(0, 0, 0, 0.55);
  --noise-opacity: 0;
  --bg-radial-1: rgba(212, 165, 90, 0.05);
  --bg-radial-2: rgba(126, 176, 133, 0.04);
  --slot-bg: rgba(255, 255, 255, 0.03);
  --modal-backdrop: rgba(0, 0, 0, 0.6);
}

/* ====================== PAPER BACKGROUND ====================== */
body {
  background-color: var(--paper);
  background-image:
    radial-gradient(ellipse at top left, var(--bg-radial-1), transparent 60%),
    radial-gradient(ellipse at bottom right, var(--bg-radial-2), transparent 60%),
    repeating-linear-gradient(0deg, transparent 0, transparent 31px, var(--line-soft) 31px, var(--line-soft) 32px);
  transition: background-color 0.25s ease, color 0.25s ease;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.15 0 0 0 0 0.05 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: var(--noise-opacity);
  mix-blend-mode: multiply;
  z-index: 0;
}

/* ====================== LAYOUT ====================== */
#app {
  position: relative;
  z-index: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 28px 20px 80px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
@media (max-width: 480px) {
  #app { padding: 16px 14px 60px; }
}

/* ====================== HEADER ====================== */
.app-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1.5px solid var(--line);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.theme-toggle {
  width: 40px;
  height: 40px;
  flex-shrink: 0;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  background: var(--paper-card);
  color: var(--ink-soft);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease, border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.25s ease, color 0.2s ease;
  box-shadow: var(--tile-shadow);
  padding: 0;
  position: relative;
  align-self: center;
}
.theme-toggle:hover {
  transform: translateY(-1px);
  box-shadow: var(--tile-shadow-hover);
  border-color: var(--accent-gold);
  color: var(--ink);
}
.theme-toggle:active { transform: translateY(0); }
.theme-toggle svg { width: 18px; height: 18px; display: block; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
.app-title {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: clamp(28px, 5vw, 38px);
  letter-spacing: -0.02em;
  line-height: 1.05;
  font-variation-settings: 'opsz' 96;
}
.app-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent-gold);
}
.app-subtitle {
  font-size: 14px;
  color: var(--ink-soft);
  margin-top: 4px;
  font-weight: 500;
}
.header-meta {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-faint);
  white-space: nowrap;
}

/* ====================== HOME / LEVEL SELECTOR ====================== */
.intro {
  font-family: 'Fraunces', serif;
  font-size: clamp(18px, 2.5vw, 22px);
  font-style: italic;
  color: var(--ink-soft);
  margin-bottom: 28px;
  max-width: 580px;
  line-height: 1.4;
  font-variation-settings: 'opsz' 24;
}
.intro strong { font-style: normal; font-weight: 600; color: var(--ink); font-variation-settings: 'opsz' 36; }

.levels-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-bottom: 28px;
}
@media (min-width: 600px) {
  .levels-grid { grid-template-columns: repeat(2, 1fr); }
}

.level-card {
  background: var(--paper-card);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  padding: 20px 22px;
  text-align: left;
  width: 100%;
  display: flex;
  align-items: flex-start;
  gap: 18px;
  transition: transform 0.15s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  box-shadow: var(--tile-shadow);
  position: relative;
}
.level-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent-gold);
  box-shadow: var(--tile-shadow-hover);
}
.level-card:active { transform: translateY(0); }

.level-badge {
  width: 54px;
  height: 54px;
  flex-shrink: 0;
  border-radius: 50%;
  background: var(--paper-deeper);
  border: 1.5px solid var(--line);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', serif;
  line-height: 1;
}
.level-badge .num {
  font-size: 22px;
  font-weight: 600;
  font-variation-settings: 'opsz' 36;
  color: var(--ink);
}
.level-badge .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint); margin-top: 2px; font-family: 'Manrope', sans-serif; font-weight: 600; }

.level-info { flex: 1; min-width: 0; }
.level-title {
  font-family: 'Fraunces', serif;
  font-size: 19px;
  font-weight: 500;
  margin-bottom: 2px;
  font-variation-settings: 'opsz' 24;
}
.level-desc { font-size: 13px; color: var(--ink-soft); margin-bottom: 12px; }

.level-progress {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 500;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--paper-deeper);
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--line-soft);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-green), var(--accent-gold));
  transition: width 0.4s ease;
}
.level-progress.complete .progress-fill { background: var(--accent-green); }
.level-progress.complete .progress-text { color: var(--accent-green); font-weight: 600; }

.home-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 20px;
  border-top: 1px dashed var(--line);
}
.text-link {
  font-size: 13px;
  color: var(--ink-soft);
  text-decoration: underline;
  text-decoration-color: var(--line);
  text-underline-offset: 3px;
  padding: 6px 0;
  font-weight: 500;
}
.text-link:hover { color: var(--accent-red); text-decoration-color: var(--accent-red); }

/* ====================== PRACTICE VIEW ====================== */
.practice-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 12px;
  flex-wrap: wrap;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: var(--ink-soft);
  font-weight: 500;
  padding: 8px 12px 8px 8px;
  border-radius: 8px;
  transition: background 0.15s ease;
}
.back-btn:hover { background: var(--paper-deeper); }
.back-btn .arrow { font-size: 18px; line-height: 1; }

.topbar-progress {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--ink-soft);
  font-weight: 500;
}
.topbar-progress .count {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  font-variation-settings: 'opsz' 24;
}
.topbar-progress .level-tag {
  background: var(--paper-deeper);
  border: 1px solid var(--line);
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  color: var(--ink);
}

/* Polish prompt */
.prompt-card {
  background: var(--paper-card);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  margin-bottom: 24px;
  position: relative;
  box-shadow: var(--tile-shadow);
}
.prompt-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  font-weight: 600;
  margin-bottom: 10px;
}
.prompt-text {
  font-family: 'Fraunces', serif;
  font-size: clamp(22px, 3.5vw, 28px);
  font-weight: 500;
  font-style: italic;
  line-height: 1.3;
  color: var(--ink);
  font-variation-settings: 'opsz' 48;
}

/* Speaker button (inside prompt card, plays target English sentence) */
.speak-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--tile-bg);
  border: 1.5px solid var(--line);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--ink);
  box-shadow: var(--tile-shadow);
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  padding: 0;
}
.speak-btn:hover {
  border-color: var(--ink-faint);
  box-shadow: var(--tile-shadow-hover);
  transform: translateY(-1px);
}
.speak-btn:active {
  transform: translateY(0);
  box-shadow: var(--tile-shadow-active);
}
.speak-btn svg { width: 18px; height: 18px; }
.speak-btn.speaking {
  color: var(--accent-green);
  border-color: var(--accent-green);
}
@media (max-width: 600px) {
  .prompt-card { padding-right: 64px; }
  .speak-btn { top: 12px; right: 12px; width: 36px; height: 36px; }
}

/* Answer area */
.answer-area {
  min-height: 90px;
  background: var(--slot-bg);
  border: 2px dashed var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-content: flex-start;
  transition: border-color 0.2s ease, background 0.2s ease;
}
.answer-area.empty::before {
  content: 'Tutaj zbuduj zdanie po angielsku ↓';
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: var(--ink-faint);
  font-size: 15px;
  align-self: center;
  margin: auto;
}
.answer-area.correct { background: var(--accent-green-soft); border-color: var(--accent-green); border-style: solid; }
.answer-area.incorrect { animation: shake 0.4s ease; }
.answer-area.revealed { background: var(--accent-gold-soft); border-color: var(--accent-gold); border-style: solid; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-4px); }
}

/* Word pool */
.pool-area {
  min-height: 90px;
  padding: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-content: flex-start;
  border-radius: var(--radius);
  position: relative;
  margin-bottom: 8px;
}
.pool-area::before {
  content: '';
  position: absolute;
  top: 0;
  left: 16px;
  right: 16px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line), transparent);
}

/* Word tiles */
.tile {
  background: var(--tile-bg);
  border: 1.5px solid var(--line);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: 'Manrope', sans-serif;
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: transform 0.12s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
  box-shadow: var(--tile-shadow);
  display: inline-flex;
  align-items: center;
  min-height: 40px;
  white-space: nowrap;
  touch-action: manipulation;
}
.tile:hover {
  transform: translateY(-1px);
  box-shadow: var(--tile-shadow-hover);
  border-color: var(--accent-gold);
}
.tile:active {
  transform: translateY(0);
  box-shadow: var(--tile-shadow-active);
  background: var(--paper-deeper);
}
.tile.placeholder {
  opacity: 0.25;
  pointer-events: none;
  background: transparent;
  border-style: dashed;
  box-shadow: none;
}
.answer-area.correct .tile { border-color: var(--accent-green); background: var(--tile-bg); }
.answer-area.revealed .tile { border-color: var(--accent-gold); background: var(--tile-bg); }

/* Slight tilt for hand-crafted feel */
.tile:nth-child(3n+1) { transform: rotate(-0.4deg); }
.tile:nth-child(3n+2) { transform: rotate(0.3deg); }
.tile:nth-child(3n+3) { transform: rotate(-0.2deg); }
.tile:hover { transform: translateY(-1px) rotate(0deg); }
.tile:active { transform: translateY(0) rotate(0deg); }

@media (max-width: 480px) {
  .tile { padding: 9px 12px; font-size: 15px; min-height: 38px; }
}

/* ====================== FEEDBACK ====================== */
.feedback {
  text-align: center;
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 500;
  margin: 4px 0 16px;
  min-height: 28px;
  font-variation-settings: 'opsz' 24;
  font-style: italic;
}
.feedback.correct { color: var(--accent-green); animation: fadeIn 0.3s ease; }
.feedback.incorrect { color: var(--accent-red); animation: fadeIn 0.3s ease; }
.feedback.revealed { color: var(--accent-gold); animation: fadeIn 0.3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ====================== ACTION BUTTONS ====================== */
.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 4px;
}
.btn {
  padding: 12px 22px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 15px;
  border: 1.5px solid var(--line);
  background: var(--paper-card);
  color: var(--ink);
  transition: all 0.15s ease;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: var(--tile-shadow);
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--tile-shadow-hover); border-color: var(--ink-faint); }
.btn:active { transform: translateY(0); box-shadow: var(--tile-shadow-active); }
.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: var(--tile-shadow) !important;
}
.btn.primary {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.btn.primary:hover { filter: brightness(0.92); border-color: var(--ink); }
.btn.danger { background: var(--accent-red); color: #ffffff; border-color: var(--accent-red); }
.btn.danger:hover { filter: brightness(0.92); border-color: var(--accent-red); }
.btn.subtle { background: transparent; border-color: var(--line); color: var(--ink-soft); box-shadow: none; }
.btn.subtle:hover { box-shadow: none; background: var(--paper-deeper); }

/* ====================== COMPLETION SCREEN ====================== */
.completion {
  text-align: center;
  padding: 48px 24px;
  background: var(--paper-card);
  border: 1.5px solid var(--accent-green);
  border-radius: var(--radius);
  box-shadow: var(--tile-shadow);
}
.completion-mark {
  font-family: 'Fraunces', serif;
  font-size: 64px;
  color: var(--accent-green);
  margin-bottom: 8px;
  line-height: 1;
}
.completion h2 {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 500;
  margin-bottom: 10px;
  font-variation-settings: 'opsz' 36;
}
.completion p { color: var(--ink-soft); margin-bottom: 20px; }

/* ====================== MODAL ====================== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: var(--modal-backdrop);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 100;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--paper-card);
  border-radius: var(--radius);
  padding: 28px;
  max-width: 380px;
  width: 100%;
  border: 1.5px solid var(--line);
  box-shadow: 0 20px 60px rgba(40, 30, 10, 0.25);
}
.modal h3 {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 10px;
  font-variation-settings: 'opsz' 36;
}
.modal p { color: var(--ink-soft); margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ====================== FOOTER ====================== */
.footer {
  margin-top: auto;
  padding-top: 32px;
  text-align: center;
  font-size: 12px;
  color: var(--ink-faint);
  font-style: italic;
  font-family: 'Fraunces', serif;
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ==========================================================
   SENTENCES DATABASE — 300 pairs across 5 levels
   Each: { pl: Polish prompt, en: English target sentence }
   ========================================================== */

/* ==========================================================
   STATE & PERSISTENCE
   ========================================================== */
const STORAGE_KEY = 'zdaniaZKlockow:v1';

function defaultState() {
  return {
    version: 1,
    view: 'home',
    currentLevel: null,
    solved: { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [], 7: [], 8: [] },
    // Per-session (not persisted)
    currentIdx: null,
    pool: [],
    answer: [],
    status: 'attempting', // 'attempting' | 'correct' | 'incorrect' | 'revealed'
    modal: null
  };
}

let state = (function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const saved = JSON.parse(raw);
    const s = defaultState();
    if (saved.solved) {
      for (const k of [1,2,3,4,5,6,7,8]) {
        if (Array.isArray(saved.solved[k])) {
          // Filter out any indices that no longer exist (in case sentence list shrinks)
          s.solved[k] = saved.solved[k].filter(i => i >= 0 && i < SENTENCES[k].length);
        }
      }
    }
    if (saved.currentLevel && SENTENCES[saved.currentLevel]) {
      s.currentLevel = saved.currentLevel;
    }
    return s;
  } catch (e) {
    return defaultState();
  }
})();

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version: state.version,
      currentLevel: state.currentLevel,
      solved: state.solved
    }));
  } catch (e) {
    /* localStorage might be unavailable in private mode — fail silently */
  }
}

/* ==========================================================
   HELPERS
   ========================================================== */
function tokenize(sentence) {
  return sentence.split(' ').map((word, idx) => ({ id: idx, word }));
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleNonIdentical(tiles) {
  if (tiles.length < 2) return tiles.slice();
  let attempts = 0;
  while (attempts < 10) {
    const s = shuffle(tiles);
    const sameOrder = s.every((t, i) => t.id === tiles[i].id);
    if (!sameOrder) return s;
    attempts++;
  }
  // Force a swap of first two
  const s = tiles.slice();
  [s[0], s[1]] = [s[1], s[0]];
  return s;
}

function pickRandomUnsolved() {
  const lvl = state.currentLevel;
  const all = SENTENCES[lvl];
  const solvedSet = new Set(state.solved[lvl]);
  const remaining = [];
  for (let i = 0; i < all.length; i++) {
    if (!solvedSet.has(i)) remaining.push(i);
  }
  if (remaining.length === 0) return null;
  return remaining[Math.floor(Math.random() * remaining.length)];
}

function loadNewQuestion() {
  const idx = pickRandomUnsolved();
  if (idx === null) {
    state.currentIdx = null;
    state.pool = [];
    state.answer = [];
    state.status = 'completed';
    return;
  }
  const sentence = SENTENCES[state.currentLevel][idx];
  const tiles = tokenize(sentence.en);
  state.currentIdx = idx;
  state.pool = shuffleNonIdentical(tiles);
  state.answer = [];
  state.status = 'attempting';
}

function tilesEqual(answer, expected) {
  if (answer.length !== expected.length) return false;
  return answer.every((t, i) => t.word === expected[i].word);
}

/* ==========================================================
   SPEECH SYNTHESIS — Web Speech API (English only)
   ========================================================== */
const SPEECH_AVAILABLE = typeof window !== 'undefined'
  && 'speechSynthesis' in window
  && 'SpeechSynthesisUtterance' in window;

let _englishVoice = null;

function pickEnglishVoice() {
  if (!SPEECH_AVAILABLE) return null;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  // Preference: British English first (taught in Polish schools), then US, then any English
  return voices.find(v => v.lang === 'en-GB') ||
         voices.find(v => v.lang === 'en-US') ||
         voices.find(v => v.lang && v.lang.startsWith('en-')) ||
         voices.find(v => v.lang === 'en') ||
         null;
}

function refreshVoice() { _englishVoice = pickEnglishVoice(); }

if (SPEECH_AVAILABLE) {
  refreshVoice();
  try {
    speechSynthesis.addEventListener('voiceschanged', refreshVoice);
  } catch (e) {
    // Older browsers use onvoiceschanged property
    speechSynthesis.onvoiceschanged = refreshVoice;
  }
}

function speak(text, opts) {
  if (!SPEECH_AVAILABLE || !text) return;
  try {
    speechSynthesis.cancel(); // interrupt any current/queued utterance
    // Strip trailing punctuation that creates awkward pauses; keep apostrophes (don't, I'll)
    const cleaned = String(text).replace(/[.,!?;:]+$/g, '').trim();
    if (!cleaned) return;
    const u = new SpeechSynthesisUtterance(cleaned);
    u.lang = 'en-GB';
    u.rate = (opts && typeof opts.rate === 'number') ? opts.rate : 0.9;
    u.pitch = 1.0;
    u.volume = 1.0;
    if (!_englishVoice) refreshVoice(); // lazy retry if voices loaded after init
    if (_englishVoice) u.voice = _englishVoice;
    // Optional visual feedback on a button while speaking
    if (opts && opts.btn) {
      const btn = opts.btn;
      u.onstart = () => btn.classList.add('speaking');
      u.onend = () => btn.classList.remove('speaking');
      u.onerror = () => btn.classList.remove('speaking');
    }
    speechSynthesis.speak(u);
  } catch (e) {
    // Speech is enhancement; never break the app
  }
}

      <button class="btn subtle" data-action="reveal">Pokaż rozwiązanie</button>
      <button class="btn primary" data-action="check" ${canCheck ? '' : 'disabled'}>Sprawdź</button>

  return `
    <header class="app-header">

/* ==========================================================
   RENDER
   ========================================================== */
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  const html = (state.view === 'practice' ? renderPractice() : renderHome()) + renderModal();
  const root = document.getElementById('app');

  if (document.startViewTransition && state.view === 'practice') {
    document.startViewTransition(() => { root.innerHTML = html; });
  } else {
    root.innerHTML = html;
  }
}

document.addEventListener('click', (e) => {
  // Tile interactions
  const tile = e.target.closest('[data-tile]');
  if (tile && state.view === 'practice') {
    const id = parseInt(tile.dataset.tile, 10);
    const where = tile.dataset.where;
    // Speak the word — always, regardless of status (works during attempt, after correct, after reveal)
    const found = state.pool.find(t => t.id === id) || state.answer.find(t => t.id === id);
    if (found) speak(found.word);
    // Move the tile only when status allows it
    if (state.status !== 'attempting' && state.status !== 'incorrect') return;
    if (where === 'pool') {
      const idx = state.pool.findIndex(t => t.id === id);
      if (idx >= 0) {
        const [moved] = state.pool.splice(idx, 1);
        state.answer.push(moved);
        if (state.status === 'incorrect') state.status = 'attempting';
        render();
      }
    } else if (where === 'answer') {
      const idx = state.answer.findIndex(t => t.id === id);
      if (idx >= 0) {
        const [moved] = state.answer.splice(idx, 1);
        state.pool.push(moved);
        if (state.status === 'incorrect') state.status = 'attempting';
        render();
      }
    }
    return;
  }

  // Actions
  const actionEl = e.target.closest('[data-action]');
  if (actionEl) {
    const action = actionEl.dataset.action;
    handleAction(action);
    return;
  }

  // Level card
  const levelCard = e.target.closest('[data-level]');
  if (levelCard) {
    const lvl = parseInt(levelCard.dataset.level, 10);
    startLevel(lvl);
    return;
  }

  // Modal backdrop
  if (e.target.matches('[data-modal-close]')) {
    state.modal = null;
    render();
  }
});

function handleAction(action) {
  switch (action) {
    case 'home':
      state.view = 'home';
      state.currentIdx = null;
      state.pool = [];
      state.answer = [];
      state.status = 'attempting';
      saveState();
      render();
      break;
    case 'check':
      checkAnswer();
      break;
    case 'reveal':
      revealAnswer();
      break;
    case 'clear':
      // Move all answer tiles back to pool (re-shuffled)
      state.pool = shuffleNonIdentical(state.pool.concat(state.answer));
      state.answer = [];
      if (state.status === 'incorrect') state.status = 'attempting';
      render();
      break;
    case 'next':
      loadNewQuestion();
      saveState();
      render();
      break;
    case 'reset':
      state.modal = 'reset';
      render();
      break;
    case 'modal-cancel':
      state.modal = null;
      render();
      break;
    case 'modal-confirm-reset':
      state.solved = { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [], 7: [], 8: [] };
      state.modal = null;
      saveState();
      render();
      break;
    case 'theme-toggle': {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('zdaniaZKlockow:theme', next); } catch (e) {}
      // Update mobile browser chrome color
      const meta = document.getElementById('metaThemeColor');
      if (meta) meta.setAttribute('content', next === 'dark' ? '#14110b' : '#f8f3e7');
      // No re-render needed — CSS handles all visual changes via the data-theme attribute
      break;
    }
    case 'speak-sentence': {
      if (state.view !== 'practice' || state.currentLevel == null || state.currentIdx == null) break;
      const sentence = SENTENCES[state.currentLevel][state.currentIdx];
      if (!sentence) break;
      const btn = document.querySelector('.speak-btn');
      speak(sentence.en, { rate: 0.9, btn: btn });
      break;
    }
  }
}

function startLevel(lvl) {
  state.currentLevel = lvl;
  state.view = 'practice';
  loadNewQuestion();
  saveState();
  render();
}

function checkAnswer() {
  const expected = tokenize(SENTENCES[state.currentLevel][state.currentIdx].en);
  if (tilesEqual(state.answer, expected)) {
    state.status = 'correct';
    // Mark as solved
    if (!state.solved[state.currentLevel].includes(state.currentIdx)) {
      state.solved[state.currentLevel].push(state.currentIdx);
    }
    saveState();
    render();
    // Auto advance after a short pause
    setTimeout(() => {
      if (state.status === 'correct') {
        loadNewQuestion();
        saveState();
        render();
      }
    }, 1400);
  } else {
    state.status = 'incorrect';
    render();
  }
}

function revealAnswer() {
  const expected = tokenize(SENTENCES[state.currentLevel][state.currentIdx].en);
  state.answer = expected.slice();
  state.pool = [];
  state.status = 'revealed';
  render();
}

/* ==========================================================
   INIT
   ========================================================== */
// Restore last-used level if user was mid-practice
if (state.currentLevel && SENTENCES[state.currentLevel]) {
  // Stay on home; let user choose. (Could auto-resume but home is friendlier.)
}
render();
</script>
